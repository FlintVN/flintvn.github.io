<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"></head>
        <title>Squeezelite-ESP32 installer</title>
        <meta name="description" content="Easily allow users to install FlintJVM firmware on the web for ESP32."></meta>
        <meta name="viewport" content="width=device-width"></meta>
        <meta name="color-scheme" content="dark light"></meta>
        <script type="module" src="https://unpkg.com/esp-web-tools@8.0.1/dist/web/install-button.js?module"></script>
    </head>
    <body>
        <esp-web-install-button manifest="https://firmware.esphome.io/esp-web-tools/manifest.json">
            <button slot="activate">Custom install button</button>
            <span slot="unsupported">Ah snap, your browser doesn't work!</span>
            <span slot="not-allowed">Ah snap, you are not allowed to use this on HTTP!</span>
        </esp-web-install-button>
    </body>
</html>
